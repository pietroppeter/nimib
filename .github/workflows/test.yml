name: Run tests
on: 
  push:
    branches:
      - main
  pull_request:
jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        nim:
          - '1.6.x'
          - 'stable'
          - 'devel'
      fail-fast: false
    name: Nim ${{ matrix.nim }}
    steps:
      - uses: actions/checkout@v3
      - uses: jiro4989/setup-nim-action@v2.2.2
        with:
          nim-version: ${{ matrix.nim }}
      - run: apt install libpcre3 libpcre3-dev
      - run: nimble -y install
      - run: nimble docsdeps
      - run: nimble test
